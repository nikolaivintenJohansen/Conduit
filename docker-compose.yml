services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uaw
      POSTGRES_PASSWORD: uaw
      POSTGRES_DB: uaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schemas/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
      - ./schemas/002_oauth_and_apps.sql:/docker-entrypoint-initdb.d/002_oauth_and_apps.sql:ro
      - ./schemas/003_settlement.sql:/docker-entrypoint-initdb.d/003_settlement.sql:ro
      - ./scripts/sandbox_seed.sql:/docker-entrypoint-initdb.d/004_sandbox_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uaw -d uaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://uaw:uaw@postgres:5432/uaw
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build: .
    command: ["python", "-m", "services.gateway.worker"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://uaw:uaw@postgres:5432/uaw
      REDIS_URL: redis://redis:6379/0
      WORKER_MAX_BATCH: "50"
      WORKER_POLL_MS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  settlement:
    build: .
    command: ["python", "-m", "services.wallet.settlement_scheduler"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://uaw:uaw@postgres:5432/uaw
      REDIS_URL: redis://redis:6379/0
      SETTLEMENT_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
