name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uaw
          POSTGRES_PASSWORD: uaw
          POSTGRES_DB: uaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uaw -d uaw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://uaw:uaw@localhost:5432/uaw_test
      DATABASE_URL: postgresql://uaw:uaw@localhost:5432/uaw_test
      REDIS_URL: redis://localhost:6379/0
      KEY_HASH_PEPPER: test-pepper
      JWT_SECRET: test-jwt-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply schema
        run: psql postgresql://uaw:uaw@localhost:5432/uaw_test -f schemas/001_initial.sql
        env:
          PGPASSWORD: uaw

      - name: Lint
        run: ruff check services tests

      - name: Test
        run: pytest -v --cov=services --cov-report=term-missing
